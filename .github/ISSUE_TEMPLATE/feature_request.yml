name: ✨ Feature Request
description: Suggest a new feature or improvement for Ansimax
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees:
  - Brashkie

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe your idea clearly.

  - type: dropdown
    id: module
    attributes:
      label: Related Module
      description: Which module does this feature relate to?
      options:
        - color
        - animate
        - ascii
        - loader
        - frames
        - components
        - themes
        - images
        - trees
        - configure
        - utils
        - New module
        - Other / General
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe it.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like and how it should work.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API (optional)
      description: If you have ideas about the API design, show an example.
      render: typescript
      placeholder: |
        import { color } from 'ansimax';
        // proposed usage

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: checkboxes
    id: roadmap
    attributes:
      label: Roadmap Check
      description: Is this feature already on the roadmap?
      options:
        - label: I checked the README roadmap and this is not listed
