name: Stale Issues & PRs

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Label & close stale issues/PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in
            14 days if there's no further activity. To keep it open, add a
            comment or remove the `stale` label.
          close-issue-message: |
            Closing due to inactivity. Feel free to reopen if the issue is
            still relevant.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,help wanted,good first issue,roadmap'

          # PRs
          stale-pr-message: |
            This PR has been inactive for 30 days. It will be closed in
            7 days if there's no further activity. To keep it open, push
            a commit or remove the `stale` label.
          close-pr-message: |
            Closing due to inactivity. Feel free to reopen if you'd like
            to continue working on this.
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,work-in-progress'

          # General
          operations-per-run: 100
          remove-stale-when-updated: true
