version: 2
updates:
  # NPM dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Lima'
    open-pull-requests-limit: 10
    reviewers:
      - 'Brashkie'
    assignees:
      - 'Brashkie'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    # Group related updates together to reduce PR noise
    groups:
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
          - 'ts-jest'
          - 'tsup'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@typescript-eslint/*'
          - 'prettier'
      jest:
        patterns:
          - 'jest'
          - '@types/jest'
    ignore:
      # Major version updates require manual review
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    groups:
      actions:
        patterns:
          - '*'
